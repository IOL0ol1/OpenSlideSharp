name: Generate bindings and publish Interop

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.x'

      - name: Run download and generate bindings
        shell: pwsh
        run: |
          cd generation
          ./Download.ps1
          dotnet tool restore
          dotnet ClangSharpPInvokeGenerator "@GenerateOpenSlide.rsp"

      - name: Update csproj Version with timestamp
        shell: pwsh
        run: |
          # Path to the project file
          $csproj = 'src/OpenSlideSharp.Interop/OpenSlideSharp.Interop.csproj'
          if (-not (Test-Path $csproj)) { Write-Error "CSProj not found"; exit 1 }

          # Load XML while preserving whitespace
          $xml = New-Object System.Xml.XmlDocument
          $xml.PreserveWhitespace = $true
          $xml.Load($csproj)

          # Select PropertyGroup that contains Version or use the first one
          $pg = $xml.SelectSingleNode("//PropertyGroup[Version]") ?? $xml.SelectSingleNode("//PropertyGroup[1]")
          if (-not $pg) { Write-Error "No PropertyGroup found"; exit 1 }

          # Get or create Version node
          $versionNode = $pg.SelectSingleNode("Version") ?? $pg.AppendChild($xml.CreateElement("Version"))

          # Generate new version suffix
          $now = Get-Date -Format 'yyyyMMddHHmm'
          $version = $versionNode.InnerText.Trim()

          # Replace last part of version with timestamp
          if ($version -match '\.') {
            $parts = $version -split '\.'
            $parts[-1] = $now
            $newVersion = $parts -join '.'
          } else {
            $newVersion = "1.0.$now"
          }

          # Save updated version
          $versionNode.InnerText = $newVersion
          $xml.Save($csproj)
          Write-Host "Updated to version $newVersion"

      # Build only - NuGet package is auto-generated on build (GeneratePackageOnBuild)
      - name: Build (auto-generate nupkg)
        run: |
          dotnet build src/OpenSlideSharp.Interop/OpenSlideSharp.Interop.csproj -c Release

      # Push packages to NuGet.org only on main branch
      - name: Push to NuGet.org
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $nupkgs = Get-ChildItem -Recurse -Filter "*.nupkg" | Where-Object { $_.FullName -notmatch "symbols" }
          foreach ($pkg in $nupkgs) {
            dotnet nuget push $pkg.FullName `
              --api-key ${{ secrets.NUGET_API_KEY }} `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }

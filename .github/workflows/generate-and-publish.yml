name: Generate bindings and publish Interop

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
  issues:
    types: [opened]

jobs:
  generate-and-publish:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.x'

      - name: Run download and generate bindings
        shell: pwsh
        run: |
          cd generation
          ./Download.ps1
          dotnet tool restore
          dotnet ClangSharpPInvokeGenerator "@GenerateOpenSlide.rsp"

      - name: Update csproj Version with timestamp
        shell: pwsh
        run: |
          # Path to the csproj file
          $csproj = 'src/OpenSlideSharp.Interop/OpenSlideSharp.Interop.csproj'

          if (-not (Test-Path $csproj)) {
            Write-Error "CSProj not found: $csproj"
            exit 1
          }

          # Load XML with proper whitespace preservation
          $xml = New-Object System.Xml.XmlDocument
          $xml.PreserveWhitespace = $true
          $xml.Load($csproj)

          # MSBuild namespace required for modern SDK-style csproj
          $nsManager = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $nsManager.AddNamespace("msbuild", "http://schemas.microsoft.com/developer/msbuild/2003")

          # Select first PropertyGroup that contains Version, otherwise use first PropertyGroup
          $pg = $xml.SelectSingleNode("//msbuild:PropertyGroup[msbuild:Version]", $nsManager)
          if (-not $pg) {
            $pg = $xml.SelectSingleNode("//msbuild:PropertyGroup[1]", $nsManager)
          }

          if (-not $pg) {
            Write-Error "No PropertyGroup found in csproj"
            exit 1
          }

          # Get existing Version node or create a new one
          $versionNode = $pg.SelectSingleNode("msbuild:Version", $nsManager)
          if (-not $versionNode) {
            $versionNode = $xml.CreateElement("Version", $nsManager.LookupNamespace("msbuild"))
            $pg.AppendChild($versionNode) | Out-Null
          }

          # Generate new build number based on current time
          $now = Get-Date -Format 'yyyyMMddHH'
          $version = $versionNode.InnerText.Trim()

          if ($version -match '\.') {
            $parts = $version -split '\.'
            $parts[-1] = $now
            $newVersion = $parts -join '.'
          } else {
            $newVersion = "1.0.$now"
          }

          # Update and save the project file
          $versionNode.InnerText = $newVersion
          $xml.Save($csproj)
          Write-Host "Updated $csproj to version $newVersion"

      - name: Pack NuGet package
        run: |
          dotnet restore src/OpenSlideSharp.Interop/OpenSlideSharp.Interop.csproj
          dotnet pack src/OpenSlideSharp.Interop/OpenSlideSharp.Interop.csproj -c Release -o ./nupkgs

      - name: Push to NuGet.org
        if: github.ref == 'refs/heads/main'
        run: |
          $nupkgs = Get-ChildItem -Path "./nupkgs" -Filter "*.nupkg"
          foreach ($pkg in $nupkgs) {
            dotnet nuget push $pkg.FullName `
              --api-key ${{ secrets.NUGET_API_KEY }} `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }
